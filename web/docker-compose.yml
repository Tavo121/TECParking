services:
  backend:
      build: ./backend
      container_name: parking-backend
      restart: unless-stopped
      environment:
        PORT: "3001"
      ports:
        - "3001:3001"
      read_only: true
      tmpfs:
        - /tmp:size=64m
      security_opt:
        - no-new-privileges:true
      cap_drop:
        - ALL
      deploy:
        resources:
          limits:
            cpus: "0.75"
            memory: 256M
      networks:
        - parking-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_API_URL: ""
    container_name: parking-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - parking-network

networks:
  parking-network:
    driver: bridge